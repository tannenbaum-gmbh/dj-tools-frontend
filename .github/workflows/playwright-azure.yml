name: Playwright Tests on Azure

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  id-token: write   # Required for OIDC token exchange with Azure
  contents: read

jobs:
  playwright-azure:
    name: Run Playwright tests on Azure Playwright Workspaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (fallback for local runs)
        run: npx playwright install --with-deps chromium

      # Authenticate to Azure using OIDC (workload identity federation).
      # No client secrets are stored – GitHub exchanges its OIDC token for a
      # short-lived Azure access token at runtime.
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Run all Playwright tests through the Microsoft Azure Playwright
      # Workspaces service.  The service config picks up the Azure credentials
      # provided by the login step above via DefaultAzureCredential.
      - name: Run Playwright tests on Azure Playwright Workspaces
        env:
          PLAYWRIGHT_SERVICE_URL: ${{ secrets.PLAYWRIGHT_SERVICE_URL }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
        run: npx playwright test --config=playwright.service.config.ts --workers=20

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
